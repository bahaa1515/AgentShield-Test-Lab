name: AgentShield Test Lab CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Validate disposable app
        run: |
          test -f README.md
          echo "AgentShield test lab validation passed"
      - name: Validate staging secret injection
        env:
          AGENTSHIELD_STAGING_MARKER: ${{ secrets.AGENTSHIELD_STAGING_MARKER }}
        run: test -n "$AGENTSHIELD_STAGING_MARKER"
